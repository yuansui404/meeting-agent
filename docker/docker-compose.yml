services:
  # PostgreSQL 数据库
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: meeting_agent
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d meeting_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Nacos 配置中心
  nacos:
    image: nacos/nacos-server:v2.3.0
    ports:
      - "8848:8848"
      - "9848:9848"
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # Spring Boot 后端服务
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://postgres:5432/meeting_agent
      - DB_USERNAME=user
      - DB_PASSWORD=password
      - REDIS_URL=redis://redis:6379
      - NACOS_ADDR=nacos:8848
      - FILE_UPLOAD_DIR=/app/data/uploads
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-placeholder}
      - MIMO_API_KEY=${MIMO_API_KEY:-placeholder}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-placeholder}
    depends_on:
      postgres:
        condition: service_healthy
      nacos:
        condition: service_started
    volumes:
      - ../../uploads:/app/data/uploads

  # React 前端服务
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
