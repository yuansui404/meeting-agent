services:
  # PostgreSQL 数据库
  postgres:
    build:
      context: ./postgres
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: meeting_agent
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d meeting_agent"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Nacos 配置中心
  nacos:
    image: nacos/nacos-server:v2.3.0
    ports:
      - "8848:8848"
    environment:
      MODE: standalone
      NACOS_AUTH_ENABLE: "false"
      JVM_XMS: 256m
      JVM_XMX: 512m
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8848/nacos/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10

  # FunASR 官方语音识别服务（WebSocket 协议）
  funasr-service:
    image: registry.cn-hangzhou.aliyuncs.com/funasr_repo/funasr:funasr-runtime-sdk-cpu-0.4.7
    ports:
      - "10095:10095"
    volumes:
      - funasr_models:/workspace/models
    command: >
      /workspace/FunASR/runtime/websocket/build/bin/funasr-wss-server-2pass
      --download-model-dir /workspace/models
      --model-dir damo/speech_paraformer-large-vad-punc_asr_nat-zh-cn-16k-common-vocab8404-onnx
      --online-model-dir damo/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-online-onnx
      --vad-dir damo/speech_fsmn_vad_zh-cn-16k-common-onnx
      --punc-dir damo/punc_ct-transformer_zh-cn-common-vad_realtime-vocab272727-onnx
      --itn-dir thuduj12/fst_itn_zh
      --lm-dir damo/speech_ngram_lm_zh-cn-ai-wesp-fst
      --port 10095
      --certfile ""
      --keyfile ""
    healthcheck:
      test: ["CMD", "pidof", "funasr-wss-server-2pass"]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 120s

  # Spring Boot 后端服务
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/backend/Dockerfile
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_URL=jdbc:postgresql://postgres:5432/meeting_agent
      - DB_USERNAME=user
      - DB_PASSWORD=password
      - FUNASR_URL=http://funasr-service:10095
      - REDIS_URL=redis://redis:6379
      - NACOS_ADDR=nacos:8848
      - FILE_UPLOAD_DIR=/app/data/uploads
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-placeholder}
    depends_on:
      postgres:
        condition: service_healthy
      funasr-service:
        condition: service_started
      nacos:
        condition: service_started
    volumes:
      - ../../uploads:/app/data/uploads

  # React 前端服务
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/frontend/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8080/api
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  funasr_models:
