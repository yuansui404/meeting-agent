server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/meeting_agent
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

funasr:
  url: http://localhost:8501

file:
  upload-dir: ${user.home}/meeting-agent/uploads

---
spring:
  config:
    activate:
      on-profile: docker
  datasource:
    url: jdbc:postgresql://postgres:5432/meeting_agent
    username: user
    password: password
  jpa:
    show-sql: false
funasr:
  url: http://funasr-service:8501
