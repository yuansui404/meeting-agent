server:
  port: 8080

# API 配置由 Nacos 管理（http://localhost:8848/nacos）
# 修改后在 Nacos 发布配置后，执行 POST /actuator/refresh 热加载
management:
  endpoints:
    web:
      exposure:
        include: refresh,health

spring:
  application:
    name: meeting-agent
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_ADDR:localhost:8848}
        group: DEFAULT_GROUP
        file-extension: yaml
        refresh-enabled: true
  config:
    import: optional:nacos:meeting-agent.yaml
  datasource:
    url: jdbc:postgresql://localhost:5432/meeting_agent
    username: user
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

# API 配置由 Nacos 管理（http://localhost:8848/nacos）
rag:
  chunk:
    strategy: structural
    size: 512
    overlap: 128
  retrieval:
    vector-topk: 20
    fts-topk: 20
    rrf-k: 60
    rerank-enabled: false
    rerank-topk: 5
  evidence:
    threshold: 0.35
    adaptive: true
    adaptive-step: 0.05
    adaptive-max: 0.5
  time-decay:
    enabled: true
    recent-days: 30
    recent-weight: 1.2
    normal-weight: 1.0
    old-weight: 0.8
    archive-weight: 0.5
  conversation:
    summary-trigger: 3000
    max-visible-messages: 10
    max-context-tokens: 32000

file:
  upload-dir: ${user.home}/meeting-agent/uploads

---
spring:
  config:
    activate:
      on-profile: docker
    import: optional:nacos:meeting-agent.yaml
  cloud:
    nacos:
      config:
        server-addr: ${NACOS_ADDR:nacos:8848}
        group: DEFAULT_GROUP
        file-extension: yaml
        refresh-enabled: true
  datasource:
    url: jdbc:postgresql://postgres:5432/meeting_agent
    username: user
    password: password
  jpa:
    show-sql: false
rag:
  chunk:
    strategy: structural
    size: 512
    overlap: 128
  retrieval:
    vector-topk: 20
    fts-topk: 20
    rrf-k: 60
    rerank-enabled: false
    rerank-topk: 5
  evidence:
    threshold: 0.35
    adaptive: true
    adaptive-step: 0.05
    adaptive-max: 0.5
  time-decay:
    enabled: true
    recent-days: 30
    recent-weight: 1.2
    normal-weight: 1.0
    old-weight: 0.8
    archive-weight: 0.5
  conversation:
    summary-trigger: 3000
    max-visible-messages: 10
    max-context-tokens: 32000
mimo:
  api-key: ${MIMO_API_KEY:}
  url: https://token-plan-cn.xiaomimimo.com
file:
  upload-dir: /app/data/uploads
